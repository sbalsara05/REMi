<!DOCTYPE html>
<html lang="en-US" class="dark">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="REMi — dark-first glass chat with capture history and multi-model support" />
    <meta property="og:title" content="REMi" />
    <meta property="og:description" content="REMi — dark-first glass chat with capture history and multi-model support" />
    <meta property="og:image" content="/assets/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="REMi" />
    <meta name="twitter:description" content="REMi — dark-first glass chat with capture history and multi-model support" />
    <meta name="twitter:image" content="/assets/og-image.png" />
    <title>REMi</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
    <script>
      const storedTheme = localStorage.getItem('color-theme');
      const theme =
        storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system'
          ? storedTheme
          : 'dark';
      if (!storedTheme) {
        localStorage.setItem('color-theme', 'dark');
      }
      document.documentElement.classList.toggle('dark', theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches));

      const loadingContainerStyle = document.createElement('style');
      let backgroundColor;

      if (theme === 'dark') {
        backgroundColor = '#0a0a0f';
      } else if (theme === 'light') {
        backgroundColor = '#ffffff';
      } else if (theme === 'system') {
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        backgroundColor = prefersDarkScheme ? '#0a0a0f' : '#ffffff';
      } else {
        backgroundColor = '#0a0a0f';
      }

      loadingContainerStyle.innerHTML = `
        #loading-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: ${backgroundColor};
        }
        #loading-container .remi-splash-boot {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 0.75rem;
        }
        #loading-container .remi-splash-boot__mouse {
          width: 96px;
          height: 72px;
          background-image: url('assets/mouse-spritesheet.png');
          background-repeat: no-repeat;
          background-size: 1440px 936px;
          image-rendering: pixelated;
          animation: remi-boot-slide 520ms steps(8) infinite;
        }
        #loading-container .remi-splash-boot__title {
          font: 600 0.875rem/1.2 system-ui, sans-serif;
          letter-spacing: 0.28em;
          text-transform: uppercase;
          color: rgba(255, 255, 255, 0.88);
        }
        @keyframes remi-boot-slide {
          from { background-position: -320px -192px; }
          to { background-position: -832px -192px; }
        }
        #loading-container.remi-splash--exit {
          opacity: 0;
          transition: opacity 420ms ease-in;
          pointer-events: none;
        }
        @media (prefers-reduced-motion: reduce) {
          #loading-container .remi-splash-boot__mouse {
            animation: none;
            background-position: -320px -192px;
          }
        }
      `;
      document.head.appendChild(loadingContainerStyle);
    </script>
    <script defer type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div id="loading-container">
        <div class="remi-splash-boot" aria-hidden="true">
          <div class="remi-splash-boot__mouse"></div>
          <span class="remi-splash-boot__title">REMi</span>
        </div>
      </div>
    </div>
  </body>
</html>
